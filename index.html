<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Kitchen</title>
  <meta name="theme-color" content="#f97316" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { overscroll-behavior-y: none; }
    .modal-backdrop { backdrop-filter: blur(8px); }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans selection:bg-orange-200">
  <div id="app"></div>

  <script>
    const QR_CODE_IMAGE = 'public/payment-qr.svg';
    const ORDER_STORAGE_KEY = 'cloudKitchenOrders';

    const categories = ['All', 'Biryani', 'Burgers', 'Pizza', 'South Indian'];
    const menuItems = [
      { id: '1', name: 'Chicken Biryani', description: 'Authentic spice-rich biryani.', price: 349, category: 'Biryani', image: 'https://images.unsplash.com/photo-1589302168068-964664d93dc0?w=800&auto=format&fit=crop' },
      { id: '2', name: 'Sandwich', description: 'Double patty with molten cheese.', price: 50, category: 'Burgers', image: 'https://vegecravings.com/wp-content/uploads/2016/03/vegetarian-grilled-cheese-sandwich-step-by-step-recipe.jpg' },
      { id: '3', name: 'Masala Dosa', description: 'Crispy crepe with potato mash.', price: 120, category: 'South Indian', image: 'https://aroundtheyum.com/wp-content/uploads/2025/06/masala-dosa-recipe-.jpg' },
      { id: '4', name: 'Girmit', description: 'North Karnataka special girmit.', price: 50, category: 'South Indian', image: 'https://i.ytimg.com/vi/N7664RTpMU8/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLC6912yJwEsyq8u-FvvnPAKEKPWuw' },
      { id: '5', name: 'Chicken Pakoda 50Gm', description: 'Street Style Chicken Pakora.', price: 50, category: 'South Indian', image: 'https://i.ytimg.com/vi/APLIoVmQKhU/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLChOp4HQks5NiW_1Ew233mZqbXjxw' },
      { id: '6', name: 'Idli Vada Set', description: 'Steamed rice cakes with crispy vada.', price: 50, category: 'South Indian', image: 'https://images.unsplash.com/photo-1589301760014-d929f3979dbc?w=800&auto=format&fit=crop' }
    ];

    const state = {
      route: location.hash === '#admin' ? 'admin' : location.hash === '#orders' ? 'orders' : 'home',
      activeCategory: 'All',
      searchTerm: '',
      cart: [],
      cartOpen: false,
      checkoutOpen: false,
      paymentMethod: 'qr',
      orders: loadOrders()
    };

    function currency(amount) {
      return 'Rs. ' + amount;
    }

    function loadOrders() {
      try {
        return JSON.parse(localStorage.getItem(ORDER_STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveOrders() {
      localStorage.setItem(ORDER_STORAGE_KEY, JSON.stringify(state.orders));
    }

    function cartTotal() {
      return state.cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
    }

    function cartCount() {
      return state.cart.reduce((sum, item) => sum + item.quantity, 0);
    }

    function paymentLabel(method) {
      return method === 'cod' ? 'Cash on Delivery' : 'QR / UPI Scan';
    }

    function setRoute(route) {
      state.route = route;
      location.hash = route === 'admin' ? 'admin' : route === 'orders' ? 'orders' : '';
      render();
    }

    function addToCart(id) {
      const item = menuItems.find((entry) => entry.id === id);
      const existing = state.cart.find((entry) => entry.id === id);
      if (existing) existing.quantity += 1;
      else state.cart.push({ ...item, quantity: 1 });
      state.cartOpen = true;
      render();
    }

    function updateQty(id, delta) {
      state.cart = state.cart
        .map((item) => item.id === id ? { ...item, quantity: Math.max(0, item.quantity + delta) } : item)
        .filter((item) => item.quantity > 0);
      render();
    }

    function placeOrder(event) {
      event.preventDefault();
      const form = new FormData(event.target);
      const name = String(form.get('name') || '').trim();
      const phone = String(form.get('phone') || '').replace(/\D/g, '').slice(0, 10);
      const address = String(form.get('address') || '').trim();
      const transactionNote = String(form.get('transactionNote') || '').trim();

      if (!name || !phone || !address) {
        alert('Please fill in your name, phone number, and address.');
        return;
      }

      if (!/^[0-9]{10}$/.test(phone)) {
        alert('Please enter a valid 10 digit phone number.');
        return;
      }

      const order = {
        id: String(Date.now()),
        items: state.cart,
        totalAmount: cartTotal(),
        customerName: name,
        phone,
        address,
        paymentMethod: state.paymentMethod,
        paymentStatus: state.paymentMethod === 'cod' ? 'Collect on delivery' : 'Awaiting QR payment confirmation',
        transactionNote: state.paymentMethod === 'qr' ? transactionNote : '',
        status: 'Pending',
        createdAt: new Date().toISOString()
      };

      state.orders.unshift(order);
      saveOrders();
      state.cart = [];
      state.checkoutOpen = false;
      state.route = 'orders';
      location.hash = 'orders';
      alert('Order placed successfully!');
      render();
    }

    function updateOrderStatus(id, status) {
      state.orders = state.orders.map((order) => order.id === id ? { ...order, status } : order);
      saveOrders();
      render();
    }

    function deleteOrder(id) {
      if (!confirm('Delete this order?')) return;
      state.orders = state.orders.filter((order) => order.id !== id);
      saveOrders();
      render();
    }

    function renderCustomer() {
      const filtered = menuItems.filter((item) => {
        const matchesCategory = state.activeCategory === 'All' || item.category === state.activeCategory;
        const matchesSearch = item.name.toLowerCase().includes(state.searchTerm.toLowerCase());
        return matchesCategory && matchesSearch;
      });

      return `
        <div class="min-h-screen bg-gray-50 pb-20">
          <nav class="sticky top-0 z-40 bg-white/95 backdrop-blur-md border-b px-4 py-3 shadow-sm">
            <div class="max-w-6xl mx-auto flex items-center justify-between gap-3">
              <button class="text-xl font-black text-gray-900" onclick="setRoute('home')">Cloud<span class="text-orange-500">Kitchen</span></button>
              <div class="flex items-center gap-2">
                <button onclick="setRoute('orders')" class="font-bold text-gray-600 hover:text-orange-600 px-3 py-2 rounded-full">My Orders</button>
                <button onclick="state.cartOpen = true; render();" class="font-bold text-white bg-gray-900 px-4 py-2 rounded-full hover:bg-orange-600 transition">Cart (${cartCount()})</button>
              </div>
            </div>
          </nav>

          <section class="bg-gray-900 text-white text-center py-10 md:py-14 px-4">
            <h1 class="text-3xl md:text-5xl font-black mb-4">Taste the Speed</h1>
            <div class="max-w-xl mx-auto space-y-4">
              <input id="searchInput" type="text" placeholder="Search for food..." value="${state.searchTerm}" class="w-full px-4 py-3 rounded-xl text-gray-900 outline-none" />
              <div class="flex justify-center gap-2 flex-wrap">
                ${categories.map((category) => `
                  <button onclick="state.activeCategory='${category}'; render();" class="px-4 py-2 rounded-full text-sm font-bold ${state.activeCategory === category ? 'bg-orange-500' : 'bg-gray-800'}">${category}</button>
                `).join('')}
              </div>
            </div>
          </section>

          <main class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 p-4 md:p-8 max-w-6xl mx-auto">
            ${filtered.map((item) => `
              <article class="bg-white rounded-2xl shadow-sm border p-4 hover:shadow-lg transition">
                <img src="${item.image}" alt="${item.name}" class="w-full h-48 object-cover rounded-xl mb-4 bg-gray-100" />
                <h3 class="font-bold text-lg leading-tight">${item.name}</h3>
                <p class="text-sm text-gray-500 mb-4 min-h-10">${item.description}</p>
                <div class="flex justify-between items-center gap-3">
                  <span class="font-bold text-lg">${currency(item.price)}</span>
                  <button onclick="addToCart('${item.id}')" class="bg-gray-900 text-white px-5 py-2 rounded-xl text-sm font-bold hover:bg-orange-600 transition">Add</button>
                </div>
              </article>
            `).join('')}
          </main>
          ${state.cartOpen ? renderCart() : ''}
          ${state.checkoutOpen ? renderCheckout() : ''}
        </div>
      `;
    }

    function renderMyOrders() {
      return `
        <div class="min-h-screen bg-gray-50 pb-20">
          <nav class="sticky top-0 z-40 bg-white/95 backdrop-blur-md border-b px-4 py-3 shadow-sm">
            <div class="max-w-6xl mx-auto flex items-center justify-between gap-3">
              <button class="text-xl font-black text-gray-900" onclick="setRoute('home')">Cloud<span class="text-orange-500">Kitchen</span></button>
              <div class="flex items-center gap-2">
                <button onclick="setRoute('home')" class="font-bold text-gray-600 hover:text-orange-600 px-3 py-2 rounded-full">Menu</button>
                <button onclick="state.cartOpen = true; render();" class="font-bold text-white bg-gray-900 px-4 py-2 rounded-full hover:bg-orange-600 transition">Cart (${cartCount()})</button>
              </div>
            </div>
          </nav>

          <main class="max-w-3xl mx-auto p-4 md:p-8">
            <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-3 mb-6">
              <div>
                <h1 class="text-3xl font-black text-gray-900">My Orders</h1>
                <p class="text-gray-500 mt-1">Check your latest order status and payment method.</p>
              </div>
              <button onclick="setRoute('home')" class="bg-orange-500 text-white px-5 py-3 rounded-xl font-bold hover:bg-orange-600">Order More</button>
            </div>

            ${state.orders.length ? state.orders.map((order) => `
              <article class="bg-white rounded-2xl shadow-sm border p-5 mb-4">
                <div class="flex justify-between gap-3 mb-3">
                  <span class="font-bold text-gray-400">Order #${order.id.slice(-5)}</span>
                  <span class="font-bold text-sm ${order.status === 'Completed' ? 'text-green-600 bg-green-50' : 'text-orange-600 bg-orange-50'} px-3 py-1 rounded-full">${order.status}</span>
                </div>
                <div class="text-sm text-gray-500 mb-4">${new Date(order.createdAt).toLocaleString()}</div>
                <div class="space-y-2 mb-4">
                  ${order.items.map((item) => `
                    <div class="flex justify-between bg-gray-50 p-3 rounded-lg gap-3">
                      <span>${item.quantity} x ${item.name}</span>
                      <b>${currency(item.price * item.quantity)}</b>
                    </div>
                  `).join('')}
                </div>
                <div class="border-t pt-4 grid sm:grid-cols-2 gap-2 text-sm">
                  <p><b>Total:</b> ${currency(order.totalAmount)}</p>
                  <p><b>Payment:</b> ${paymentLabel(order.paymentMethod)}</p>
                  <p><b>Payment Status:</b> ${order.paymentStatus}</p>
                  <p><b>Delivery Phone:</b> ${order.phone}</p>
                </div>
              </article>
            `).join('') : `
              <div class="bg-white rounded-2xl shadow-sm border p-8 text-center">
                <h2 class="text-xl font-bold text-gray-900">No orders yet</h2>
                <p class="text-gray-500 mt-2 mb-5">Your placed orders will appear here.</p>
                <button onclick="setRoute('home')" class="bg-orange-500 text-white px-5 py-3 rounded-xl font-bold hover:bg-orange-600">Start Ordering</button>
              </div>
            `}
          </main>
          ${state.cartOpen ? renderCart() : ''}
        </div>
      `;
    }

    function renderCart() {
      return `
        <div class="fixed inset-0 bg-black/40 z-50" onclick="state.cartOpen = false; render();"></div>
        <aside class="fixed top-0 right-0 h-full w-full sm:w-[420px] bg-white z-[60] p-6 flex flex-col shadow-2xl">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">Cart</h2>
            <button onclick="state.cartOpen = false; render();" class="text-3xl leading-none text-gray-400 hover:text-gray-900">&times;</button>
          </div>
          <div class="flex-grow overflow-y-auto space-y-4">
            ${state.cart.length === 0 ? '<p class="text-center text-gray-400 mt-10">Your cart is empty.</p>' : state.cart.map((item) => `
              <div class="flex justify-between items-center border-b pb-3 gap-3">
                <div>
                  <p class="font-bold">${item.name}</p>
                  <p class="text-xs text-gray-500">${currency(item.price)}</p>
                </div>
                <div class="flex gap-3 items-center bg-gray-100 rounded-lg px-3 py-1">
                  <button onclick="updateQty('${item.id}', -1)" class="text-lg font-bold">-</button>
                  <span class="font-bold min-w-5 text-center">${item.quantity}</span>
                  <button onclick="updateQty('${item.id}', 1)" class="text-lg font-bold">+</button>
                </div>
              </div>
            `).join('')}
          </div>
          ${state.cart.length ? `
            <div class="border-t pt-4">
              <div class="flex justify-between text-lg font-black mb-4">
                <span>Total</span>
                <span>${currency(cartTotal())}</span>
              </div>
              <button onclick="state.cartOpen = false; state.checkoutOpen = true; render();" class="w-full bg-orange-500 text-white py-4 rounded-xl font-bold hover:bg-orange-600 transition">Checkout</button>
            </div>
          ` : ''}
        </aside>
      `;
    }

    function renderCheckout() {
      return `
        <div class="fixed inset-0 z-[70] flex items-center justify-center p-4">
          <div class="absolute inset-0 bg-black/60 modal-backdrop" onclick="state.checkoutOpen = false; render();"></div>
          <form onsubmit="placeOrder(event)" class="bg-white w-full max-w-2xl max-h-[92vh] overflow-y-auto rounded-2xl p-5 md:p-8 relative z-10 shadow-2xl">
            <div class="flex items-start justify-between gap-4 mb-6">
              <div>
                <h3 class="text-2xl font-bold">Checkout</h3>
                <p class="text-sm text-gray-500 mt-1">Total amount: <span class="font-bold text-gray-900">${currency(cartTotal())}</span></p>
              </div>
              <button type="button" onclick="state.checkoutOpen = false; render();" class="text-2xl leading-none text-gray-400 hover:text-gray-900">&times;</button>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
              <div class="space-y-4">
                <label class="block text-sm font-bold text-gray-700">Full Name
                  <input name="name" type="text" class="w-full border rounded-lg p-3 mt-1 focus:ring-2 focus:ring-orange-500 outline-none" placeholder="Your name" />
                </label>
                <label class="block text-sm font-bold text-gray-700">Phone Number
                  <input name="phone" type="tel" inputmode="numeric" maxlength="10" class="w-full border rounded-lg p-3 mt-1 focus:ring-2 focus:ring-orange-500 outline-none" placeholder="9876543210" />
                </label>
                <label class="block text-sm font-bold text-gray-700">Full Address
                  <textarea name="address" rows="4" class="w-full border rounded-lg p-3 mt-1 focus:ring-2 focus:ring-orange-500 outline-none" placeholder="House no, street, landmark..."></textarea>
                </label>
              </div>

              <div class="space-y-4">
                <div>
                  <label class="block text-sm font-bold text-gray-700 mb-2">Payment Method</label>
                  <div class="grid grid-cols-2 gap-2">
                    <button type="button" onclick="state.paymentMethod = 'qr'; render();" class="border-2 rounded-xl p-3 text-sm font-bold ${state.paymentMethod === 'qr' ? 'border-orange-500 bg-orange-50 text-orange-700' : 'border-gray-200 text-gray-700'}">QR Scan</button>
                    <button type="button" onclick="state.paymentMethod = 'cod'; render();" class="border-2 rounded-xl p-3 text-sm font-bold ${state.paymentMethod === 'cod' ? 'border-orange-500 bg-orange-50 text-orange-700' : 'border-gray-200 text-gray-700'}">Cash on Delivery</button>
                  </div>
                </div>

                ${state.paymentMethod === 'qr' ? `
                  <div class="border rounded-2xl p-4 text-center bg-gray-50">
                    <img src="${QR_CODE_IMAGE}" alt="Scan this QR code to pay" class="w-48 h-48 mx-auto rounded-lg border bg-white p-2 object-contain" />
                    <p class="text-sm font-bold text-gray-800 mt-3">Scan and pay ${currency(cartTotal())}</p>
                    <p class="text-xs text-gray-500 mt-1">After payment, enter the UPI reference/UTR number.</p>
                    <input name="transactionNote" type="text" class="w-full border rounded-lg p-3 mt-3 focus:ring-2 focus:ring-orange-500 outline-none" placeholder="UPI reference number (optional)" />
                  </div>
                ` : `
                  <div class="border rounded-2xl p-4 bg-green-50 text-green-900">
                    <p class="font-bold">Pay when your food arrives.</p>
                    <p class="text-sm mt-1">Please keep exact cash ready for faster delivery.</p>
                  </div>
                `}
              </div>
            </div>

            <button class="w-full bg-gray-900 text-white font-bold py-4 rounded-xl hover:bg-orange-600 transition mt-6">Place Order</button>
          </form>
        </div>
      `;
    }

    function renderAdmin() {
      return `
        <div class="min-h-screen bg-gray-50 p-4 md:p-6">
          <div class="max-w-7xl mx-auto">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-8">
              <h1 class="text-2xl md:text-3xl font-black text-gray-900">Kitchen Dashboard</h1>
              <button onclick="setRoute('home')" class="text-orange-600 font-bold hover:underline text-left sm:text-right">Go to Website</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
              ${state.orders.length ? state.orders.map((order) => `
                <article class="relative bg-white p-5 md:p-6 rounded-xl shadow-sm border-l-8 ${order.status === 'Completed' ? 'border-green-500 opacity-70' : order.status === 'Preparing' ? 'border-orange-500' : 'border-red-500'}">
                  <button onclick="deleteOrder('${order.id}')" class="absolute top-4 right-4 text-red-500 font-bold">Delete</button>
                  <div class="flex justify-between gap-3 mb-4 pr-16">
                    <span class="font-bold text-gray-400">#${order.id.slice(-5)}</span>
                    <span class="font-bold text-sm bg-gray-100 px-3 py-1 rounded-full">${order.status}</span>
                  </div>
                  <div class="mb-4 bg-blue-50 p-3 rounded-lg text-sm space-y-1">
                    <p><b>Name:</b> ${order.customerName}</p>
                    <p><b>Phone:</b> ${order.phone}</p>
                    <p><b>Address:</b> ${order.address}</p>
                    <p><b>Payment:</b> ${paymentLabel(order.paymentMethod)}</p>
                    <p><b>Payment Status:</b> ${order.paymentStatus}</p>
                    ${order.transactionNote ? `<p><b>UPI Ref:</b> ${order.transactionNote}</p>` : ''}
                  </div>
                  <div class="space-y-2 mb-4 border-b pb-4">
                    ${order.items.map((item) => `
                      <div class="flex justify-between gap-3 text-sm">
                        <span>${item.quantity} x ${item.name}</span>
                        <span class="font-bold">${currency(item.price * item.quantity)}</span>
                      </div>
                    `).join('')}
                  </div>
                  <div class="flex justify-between font-black text-lg mb-4">
                    <span>Total</span>
                    <span>${currency(order.totalAmount)}</span>
                  </div>
                  <div class="grid grid-cols-2 gap-2">
                    <button onclick="updateOrderStatus('${order.id}', 'Preparing')" class="bg-orange-100 text-orange-700 font-bold py-2 rounded">Start Cooking</button>
                    <button onclick="updateOrderStatus('${order.id}', 'Completed')" class="bg-green-100 text-green-700 font-bold py-2 rounded">Order Ready</button>
                  </div>
                </article>
              `).join('') : '<div class="bg-white p-8 rounded-xl shadow-sm text-gray-500 md:col-span-2 xl:col-span-3">No orders yet.</div>'}
            </div>
          </div>
        </div>
      `;
    }

    function bindEvents() {
      const searchInput = document.getElementById('searchInput');
      if (searchInput) {
        searchInput.addEventListener('input', (event) => {
          state.searchTerm = event.target.value;
          render();
        });
      }
    }

    function render() {
      document.getElementById('app').innerHTML = state.route === 'admin' ? renderAdmin() : state.route === 'orders' ? renderMyOrders() : renderCustomer();
      bindEvents();
    }

    window.addEventListener('hashchange', () => {
      state.route = location.hash === '#admin' ? 'admin' : location.hash === '#orders' ? 'orders' : 'home';
      render();
    });

    render();
  </script>
</body>
</html>
